name: CI/CD - CEN LABS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # JOB 1: Lint y TypeScript Check
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cen-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: cen-dashboard
        run: npm ci

      - name: Run ESLint
        working-directory: cen-dashboard
        run: npm run lint || true

      - name: TypeScript check
        working-directory: cen-dashboard
        run: npx tsc --noEmit || true

  # ============================================
  # JOB 2: Build
  # ============================================
  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cen-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: cen-dashboard
        run: npm ci

      - name: Build application
        working-directory: cen-dashboard
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: cen-dashboard/.next
          retention-days: 7

  # ============================================
  # JOB 3: Smoke Tests (Future)
  # ============================================
  test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cen-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: cen-dashboard
        run: npm ci

      - name: Install test dependencies
        working-directory: cen-dashboard
        run: npm install -D jest @testing-library/react @testing-library/jest-dom @types/jest ts-jest jest-environment-jsdom

      - name: Run tests
        working-directory: cen-dashboard
        run: npm test || echo "Tests pending setup"

  # ============================================
  # JOB 4: Lighthouse Audit (Optional)
  # ============================================
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cen-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: cen-dashboard
        run: npm ci

      - name: Build application
        working-directory: cen-dashboard
        run: npm run build

      - name: Run Lighthouse
        working-directory: cen-dashboard
        run: |
          npx playwright install --with-deps chromium
          npx next start &
          sleep 10
          npx lighthouse http://localhost:3000 --output=json --output-path=./lighthouse-report.json
          pkill -f "next start"

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: cen-dashboard/lighthouse-report.json
          retention-days: 30

  # ============================================
  # JOB 5: Deploy to Vercel (Production)
  # ============================================
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: cen-dashboard
          vercel-args: '--prod'
